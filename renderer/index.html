<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src https://openlibrary.org https://covers.openlibrary.org">
    <title>Book Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <script src="../node_modules/marked/lib/marked.umd.js"></script>
  </head>
  <body>

    <!-- SIDEBAR -->
    <div id="sidebar">
      <h1>📚 Book Tracker</h1>
      <button class="nav-btn active" data-view="library">Library</button>
      <button class="nav-btn" data-view="add-book">Add Book</button>
      <button class="nav-btn" data-view="filter">Filter</button>
      <button class="nav-btn" data-view="search">Search</button>
    </div>

    <!-- MAIN CONTENT -->
    <div id="main">

      <!-- LIBRARY VIEW -->
      <div id="library" class="view active">
        <div id="library-controls">
          <input type="text" id="library-search" placeholder="Search by title or author...">
          <button class="nav-btn" data-view="filter">Filter ▾</button>
        </div>
        <div id="book-grid"></div>
      </div>

      <!-- ADD BOOK VIEW -->
      <div id="add-book" class="view">
        <h2>Add a Book</h2>

        <!-- SEARCH SECTION -->
        <div id="search-section">
          <p style="color: var(--text-muted); margin-bottom: 12px;">
            Search for a book to auto-fill details, or fill in the form manually below.
          </p>
          <div style="display: flex; gap: 8px; margin-bottom: 16px;">
            <input type="text" id="api-search-input"
              placeholder="Search by title..."
              style="flex: 1; background-color: var(--bg-secondary); border: 1px solid var(--bg-card); border-radius: 6px; color: var(--text-primary); padding: 8px 12px;">
            <button class="btn-primary" id="btn-api-search">Search</button>
          </div>
          <div id="search-results"></div>
        </div>

        <hr style="border-color: var(--bg-card); margin: 24px 0;">

        <!-- MANUAL FORM -->
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="input-title">
        </div>
        <div class="form-group">
          <label>Author</label>
          <input type="text" id="input-author">
        </div>
        <div class="form-group">
          <label>Cover URL</label>
          <input type="text" id="input-cover-url" placeholder="Auto-filled by search, or paste a URL">
        </div>
        <div class="form-group">
          <label>Genre</label>
          <input type="text" id="input-genre">
        </div>
        <div class="form-group">
          <label>Tags (comma separated)</label>
          <input type="text" id="input-tags">
        </div>
        <div class="form-group">
          <label>Series Name</label>
          <input type="text" id="input-series-name">
        </div>
        <div class="form-group">
          <label>Series Order</label>
          <input type="number" id="input-series-order">
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="input-status">
            <option value="want">Want to Read</option>
            <option value="reading">Currently Reading</option>
            <option value="finished">Finished</option>
          </select>
        </div>
        <div class="form-group">
          <label>Format</label>
          <select id="input-format">
            <option value="physical">Physical</option>
            <option value="digital">Digital</option>
            <option value="both">Both</option>
          </select>
        </div>
        <div class="form-group">
          <label>Rating (1-5)</label>
          <input type="number" id="input-rating" min="1" max="5">
        </div>
        <div class="form-group">
          <label>Notes (Markdown supported)</label>
          <textarea id="input-notes"></textarea>
        </div>
        <button class="btn-primary" id="btn-add-book">Add Book</button>
      </div>

      <!-- FILTER VIEW -->
      <div id="filter" class="view">
        <h2>Filter Library</h2>

        <div class="form-group">
          <label>Status</label>
          <select id="filter-status">
            <option value="">All</option>
            <option value="want">Want to Read</option>
            <option value="reading">Currently Reading</option>
            <option value="finished">Finished</option>
          </select>
        </div>

        <div class="form-group">
          <label>Format</label>
          <select id="filter-format">
            <option value="">All</option>
            <option value="physical">Physical</option>
            <option value="digital">Digital</option>
            <option value="both">Both</option>
          </select>
        </div>

        <div class="form-group">
          <label>Genre</label>
          <input type="text" id="filter-genre" placeholder="e.g. Fantasy">
        </div>

        <div class="form-group">
          <label>Tags</label>
          <input type="text" id="filter-tags" placeholder="e.g. cozy">
        </div>

        <div class="form-group">
          <label>Minimum Rating</label>
          <select id="filter-rating">
            <option value="">Any</option>
            <option value="1">★ and above</option>
            <option value="2">★★ and above</option>
            <option value="3">★★★ and above</option>
            <option value="4">★★★★ and above</option>
            <option value="5">★★★★★ only</option>
          </select>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <button class="btn-primary" id="btn-apply-filters">Apply Filters</button>
          <button class="btn-danger" id="btn-clear-filters">Clear All</button>
        </div>
      </div>

      <!-- SEARCH VIEW -->
      <div id="search" class="view">
        <h2>Search</h2>
        <p style="color: var(--text-muted)">Coming soon.</p>
      </div>

      <!-- DETAIL VIEW -->
      <div id="detail" class="view">
        <button class="nav-btn" id="btn-back">← Back to Library</button>
        <div id="detail-content"></div>
      </div>

    </div>

    <script src="app.js"></script>
  </body>
</html>
